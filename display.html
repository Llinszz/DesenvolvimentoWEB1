<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu com Flex</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #111;
    }

    .menu {
      background: #ffffff;
      padding: 1rem;
      border-bottom: 1px solid #d1d5db;
    }

    .menu__list {
      display: flex;
      gap: 1rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .menu__item {
      margin: 0;
    }

    .menu__link {
      text-decoration: none;
      color: #1f2937;
      padding: 0.5rem 0.75rem;
      display: inline-block;
    }

    .menu__link:hover {
      background: #e2e8f0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <nav class="menu">
    <ul class="menu__list">
      <li class="menu__item"><a class="menu__link" href="#home">Home</a></li>
      <li class="menu__item"><a class="menu__link" href="#servicos">Serviços</a></li>
      <li class="menu__item"><a class="menu__link" href="#sobre">Sobre</a></li>
      <li class="menu__item"><a class="menu__link" href="#contato">Contato</a></li>
    </ul>
  </nav>
</body>
</html>
